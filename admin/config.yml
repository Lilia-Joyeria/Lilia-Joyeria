backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "productos"
    label: "Productos"
    label_singular: "Producto"
    files:
      - file: "data/productos.json"
        label: "Lista de productos"
        name: "productos"
        fields:
          - label: "Productos"
            name: "items"
            widget: "list"
            fields:
              - label: "Nombre"
                name: "nombre"
                widget: "string"
              - label: "Precio"
                name: "precio"
                widget: "string"
              - label: "Imagen"
                name: "imagen"
                widget: "image"
              - label: "Descripcion"
                name: "descripcion"
                widget: "text"
              - label: "Material"
                name: "material"
                widget: "string"
              - label: "Tallas"
                name: "tallas"
                widget: "list"