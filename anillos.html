<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anillos Lilia - Joyería</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="contenedor">

    <header class="header">
        <div class="logo">💎 Lilia - Joyería</div>

        <nav class="menu">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="anillos.html">Anillos</a></li>
                <li><a href="collares.html">Collares</a></li>
                <li><a href="pulseras.html">Pulseras</a></li>
                <li><a href="aretes.html">Aretes</a></li>
            </ul>
        </nav>

        <div class="contacto">
            <a href="contacto.html">Contacto</a>
        </div>
    </header>

    <!-- SECCIÓN PRODUCTOS -->
    <section class="productos">
        <h2>Anillos</h2>

        <div class="grid" id="contenedor-productos"></div>

        <div class="card">
            <a href="producto-anillo1.html">
                <img src="img/1.jpg">
                <h3>Anillo Elegante</h3>
                <p>Diseño fino en acero inoxidable</p>
                <span>$199 MXN</span>
            </a>
            <button>Agregar</button>
        </div>

        </div>
    </section>

    <footer class="footer">
        <p class="autor">Creado por Erick Martínez Escobar</p>
    </footer>

</div>

<script>
fetch('data/productos.json?v=' + new Date().getTime())
  .then(res => res.json())
  .then(data => {
    const contenedor = document.getElementById("contenedor-productos");

    contenedor.innerHTML = "";

    data.items.forEach((p, index) => {
      contenedor.innerHTML += `
        <div class="card" onclick="verProducto(${index})">
          <img src="${p.imagen.startsWith('/') ? p.imagen.substring(1) : p.imagen}">
          <h3>${p.nombre}</h3>
          <p>${p.descripcion}</p>
          <span>$${p.precio} MXN</span>
        </div>
      `;
    });

    // Guardamos productos para usarlos después
    window.productos = data.items;
  });

function verProducto(i) {
  localStorage.setItem("producto", JSON.stringify(window.productos[i]));
  window.location.href = "detalle.html";
}
</script>

</body>
</html>
