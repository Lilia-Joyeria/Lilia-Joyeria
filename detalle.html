<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle Producto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="contenedor">

    <section class="detalle-producto">
        <div class="detalle-contenido">

            <div class="galeria">
                <img id="imgPrincipal" class="img-principal">
            </div>

            <div class="detalle-info">
                <h1 id="nombre"></h1>
                <p id="descripcion"></p>
                <span class="precio" id="precio"></span>

                <a id="btnWhats" target="_blank" class="btn-whatsapp">
                    💬 Comprar por WhatsApp
                </a>
            </div>

        </div>
    </section>

</div>

<script>
const producto = JSON.parse(localStorage.getItem("producto"));

document.getElementById("imgPrincipal").src = producto.imagen;
document.getElementById("nombre").textContent = producto.nombre;
document.getElementById("descripcion").textContent = producto.descripcion;
document.getElementById("precio").textContent = producto.precio;

document.getElementById("btnWhats").href =
  "https://wa.me/5215571776744?text=Hola,%20quiero%20el%20" + producto.nombre;
</script>

</body>
</html>
